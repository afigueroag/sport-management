<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña - SportAcademia</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h1>🏋️ SportAcademia</h1>
        <p>Recuperar Contraseña</p>
      </div>

      <div id="alert-container"></div>

      <form id="forgot-password-form" class="auth-form">
        <p style="color: var(--text-secondary); margin-bottom: var(--spacing-6); font-size: var(--font-size-sm);">
          Ingresa tu email y te enviaremos un enlace para recuperar tu contraseña.
        </p>

        <div class="input-group">
          <label class="input-label required">Email</label>
          <input
            id="email"
            type="email"
            class="input"
            placeholder="tu@email.com"
            required
            autocomplete="email"
          >
          <div class="input-error" id="email-error"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
          Enviar Enlace de Recuperación
        </button>
      </form>

      <div class="auth-footer">
        <p><a href="login.html">Volver a iniciar sesión</a></p>
      </div>
    </div>
  </div>

  <script>
    // Placeholder - Implementar en Phase 2+
    console.log('Forgot password page - Phase 2+ implementation');

    // Por ahora, mostrar un mensaje
    document.getElementById('forgot-password-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const alertContainer = document.getElementById('alert-container');

      const alert = document.createElement('div');
      alert.className = 'alert alert-info';
      alert.innerHTML = `
        <div>Si un cuenta existe para ${email}, recibirás un email de recuperación.</div>
      `;
      alertContainer.innerHTML = '';
      alertContainer.appendChild(alert);

      setTimeout(() => {
        window.location.href = 'login.html';
      }, 3000);
    });
  </script>
</body>
</html>
