<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - SportAcademia</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h1>🏋️ SportAcademia</h1>
        <p>Iniciar Sesión</p>
      </div>

      <!-- Alertas (se muestran dinámicamente) -->
      <div id="alert-container"></div>

      <form id="login-form" class="auth-form">
        <div class="input-group">
          <label class="input-label required">Email</label>
          <input
            id="email"
            type="email"
            class="input"
            placeholder="tu@email.com"
            required
            autocomplete="email"
          >
          <div class="input-error" id="email-error"></div>
        </div>

        <div class="input-group">
          <label class="input-label required">Contraseña</label>
          <input
            id="password"
            type="password"
            class="input"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          >
          <div class="input-error" id="password-error"></div>
        </div>

        <div class="checkbox">
          <input type="checkbox" id="remember-me" name="remember-me">
          <label for="remember-me">Recuérdame</label>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
          Iniciar Sesión
        </button>

        <div class="auth-divider">O</div>

        <button type="button" class="btn btn-secondary btn-block" id="google-btn">
          Continuar con Google
        </button>
      </form>

      <div class="auth-footer">
        <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
        <p><a href="forgot-password.html">¿Olvidaste tu contraseña?</a></p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="js/pages/login.js"></script>
</body>
</html>
