<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - SportAcademia</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h1>🏋️ SportAcademia</h1>
        <p>Iniciar Sesión</p>
      </div>

      <form class="auth-form">
        <div class="input-group">
          <label class="input-label required">Email</label>
          <input type="email" class="input" placeholder="tu@email.com" required>
        </div>

        <div class="input-group">
          <label class="input-label required">Contraseña</label>
          <input type="password" class="input" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Iniciar Sesión</button>

        <div class="auth-divider">O</div>

        <button type="button" class="btn btn-secondary btn-block">Continuar con Google</button>
      </form>

      <div class="auth-footer">
        <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
        <p><a href="#">¿Olvidaste tu contraseña?</a></p>
      </div>
    </div>
  </div>

  <script>
    // Placeholder - Implementar en Phase 2
    console.log('Login page - Phase 2 implementation');
  </script>
</body>
</html>
